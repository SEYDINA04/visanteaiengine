[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore:Accessing the 'model_fields' attribute on the instance is deprecated:pydantic.PydanticDeprecatedSince211
    ignore:Inheritance class AiohttpClientSession from ClientSession is discouraged:DeprecationWarning
