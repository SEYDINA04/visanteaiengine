# Visanté AI Engine - Render Blueprint
# Uses Docker so we run Python 3.11 (ChromaDB breaks on 3.14).

services:
  - type: web
    runtime: docker
    name: visante-ai-engine

    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/status

    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Set in Render Dashboard → Environment
